services:
  caddy:
    image: caddy:2.8.4-alpine
    environment:
      AHINARENA_DOMAIN: ${AHINARENA_DOMAIN:?set AHINARENA_DOMAIN}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../frontend/dist:/srv/ahinarena/frontend:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - ingress
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          memory: 64M

volumes:
  caddy-data:
    name: ahinarena-caddy-data
  caddy-config:
    name: ahinarena-caddy-config
